version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: flight-mongodb

    restart: unless-stopped

    #ports:
     # - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend

    container_name: flight-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  frontend:
    build: ./frontend

    container_name: flight-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo_data: